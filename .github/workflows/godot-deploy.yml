name: Godot Build Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Baixar Godot
        run: |
          wget https://downloads.tuxfamily.org/godotengine/4.2/Godot_v4.2-stable_linux.x86_64.zip
          unzip Godot_v4.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2-stable_linux.x86_64

      - name: Baixar templates
        run: |
          wget https://downloads.tuxfamily.org/godotengine/4.2/Godot_v4.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.stable
          unzip Godot_v4.2-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.2.stable

      - name: Testar build web
        run: |
          mkdir build
          ./Godot_v4.2-stable_linux.x86_64 --headless --export-release "Web" build/index.html